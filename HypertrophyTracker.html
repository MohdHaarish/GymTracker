<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Hypertrophy Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0a0908; --surface:#141312; --surface-alt:#0f0e0d; --border:#242321;
    --text:#f5f2ed; --text-muted:#8a8580; --text-faint:#6b6660; --text-dim:#4a4540;
    --accent:#ff4d1f; --accent-contrast:#0a0908;
    --accent-soft:rgba(255,77,31,0.12); --accent-bg:rgba(255,77,31,0.06); --accent-border:rgba(255,77,31,0.2);
    --success-soft:rgba(125,216,125,0.15); --success-bg:rgba(125,216,125,0.04);
    --success-border:rgba(125,216,125,0.2); --success-text:#7dd87d;
    --overlay:rgba(10,9,8,0.85); --nav-bg:rgba(10,9,8,0.92); --shadow:rgba(0,0,0,0.5);
    --day-vermilion:#ff4d1f; --day-vermilion-soft:rgba(255,77,31,0.12);
    --day-amber:#f59e0b; --day-amber-soft:rgba(245,158,11,0.12);
    --day-rose:#f43f5e; --day-rose-soft:rgba(244,63,94,0.12);
    --day-cyan:#06b6d4; --day-cyan-soft:rgba(6,182,212,0.12);
    --day-emerald:#10b981; --day-emerald-soft:rgba(16,185,129,0.12);
    --day-violet:#8b5cf6; --day-violet-soft:rgba(139,92,246,0.12);
    --day-slate:#64748b; --day-slate-soft:rgba(100,116,139,0.12);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    transition: background .3s, color .3s;
    overscroll-behavior: none;
    padding-bottom: env(safe-area-inset-bottom);
  }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
  input, textarea { font: inherit; color: inherit; }
  ul, ol { list-style: none; }
  svg { display: block; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .serif { font-family: 'Fraunces', Georgia, serif; }
  .italic { font-style: italic; }
  .tab-num { font-variant-numeric: tabular-nums; }
  .upper { text-transform: uppercase; letter-spacing: 0.2em; }
  .upper-wide { text-transform: uppercase; letter-spacing: 0.3em; }
  input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  .themed-input {
    background: var(--surface-alt); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px; font-size: 14px; outline: none;
    transition: border-color .15s;
    width: 100%;
    font-family: 'JetBrains Mono', monospace;
    font-variant-numeric: tabular-nums;
  }
  .themed-input::placeholder { color: var(--text-faint); }
  .themed-input:focus { border-color: var(--accent); }
  .scroll-x { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .scroll-x::-webkit-scrollbar { display: none; }
  .fade-in { animation: fadeIn .25s ease-out both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .slide-up { animation: slideUp .25s ease-out both; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: none; } }

  /* Layout */
  .header {
    position: sticky; top: 0; z-index: 30;
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    background: var(--overlay); border-bottom: 1px solid var(--border);
  }
  .header-inner {
    padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
  }
  .brand { display: flex; align-items: center; gap: 8px; }
  .brand-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--accent); color: var(--accent-contrast);
    display: flex; align-items: center; justify-content: center;
  }
  .brand-text-top { font-family: 'Fraunces', serif; font-size: 12px; font-weight: 500; color: var(--text); }
  .brand-text-bot { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 12px;
    background: var(--surface); border: 1px solid var(--border); color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
  }
  .date-stack { text-align: right; }
  .date-top { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text); }
  .date-bot { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); }

  /* Content shared */
  .content { padding-bottom: 128px; }
  .page-head { padding: 24px 16px 16px; }
  .page-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
  .page-title { font-family: 'Fraunces', serif; font-style: italic; font-size: 36px; color: var(--text); line-height: 1; font-weight: 400; }
  .page-lede { font-size: 14px; line-height: 1.5; color: var(--text-muted); margin-top: 12px; }
  .section-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
  .card-lg { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 24px; }
  .stack-2 > * + * { margin-top: 8px; }
  .stack-3 > * + * { margin-top: 12px; }
  .stack-4 > * + * { margin-top: 16px; }

  /* Day picker */
  .day-pills { padding: 24px 16px 16px; }
  .day-pill-row { display: flex; gap: 8px; }
  .day-pill {
    flex-shrink: 0; padding: 10px 16px; border-radius: 12px;
    background: var(--surface); color: var(--text-muted);
    border: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    transition: all .15s;
  }
  .day-pill.active { border: none; }
  .day-pill-top { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.7; }
  .day-pill-bot { font-size: 12px; font-weight: 500; margin-top: 2px; }

  /* Hero card */
  .hero {
    position: relative; overflow: hidden;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 24px; padding: 24px; margin: 0 16px 24px;
  }
  .hero-blur {
    position: absolute; top: 0; right: 0; width: 192px; height: 192px;
    border-radius: 50%; filter: blur(48px); opacity: 0.2;
  }
  .hero-content { position: relative; }
  .hero-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
  .hero-subtitle { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 4px; }
  .hero-title { font-family: 'Fraunces', serif; font-style: italic; font-size: 36px; color: var(--text); line-height: 1; font-weight: 400; }
  .hero-badge { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; }
  .hero-stats { display: flex; align-items: baseline; gap: 24px; }
  .stat-num { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 300; color: var(--text); font-variant-numeric: tabular-nums; }
  .stat-num span { color: var(--text-dim); }
  .stat-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-top: 4px; }
  .progress-bar { margin-top: 20px; height: 4px; border-radius: 2px; overflow: hidden; background: var(--border); }
  .progress-fill { height: 100%; transition: width .5s; }

  /* Exercise card */
  .ex-list { padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }
  .ex-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
  }
  .ex-card.done { background: var(--success-bg); border-color: var(--success-border); }
  .ex-head {
    width: 100%; padding: 16px; display: flex; align-items: flex-start; gap: 12px;
    text-align: left;
  }
  .ex-badge {
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 500; font-variant-numeric: tabular-nums;
  }
  .ex-info { flex: 1; min-width: 0; }
  .ex-titlerow { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .ex-title { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 500; color: var(--text); line-height: 1.2; }
  .ex-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.15em;
    padding: 2px 6px; border-radius: 4px;
    background: var(--accent-soft); color: var(--accent);
  }
  .ex-meta { display: flex; align-items: center; gap: 12px; margin-top: 6px; font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .ex-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .ex-count { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .ex-chev { transition: transform .2s; color: var(--text-muted); }
  .ex-chev.open { transform: rotate(90deg); }
  .ex-body { padding: 0 16px 16px; }
  .cues {
    padding: 12px; border-radius: 12px; background: var(--surface-alt);
    margin-bottom: 16px;
  }
  .cues-label {
    display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.15em;
  }
  .cues-text { font-size: 12px; line-height: 1.5; color: var(--text); }
  .tempo-row { display: flex; align-items: center; gap: 16px; font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
  .tempo-item { display: flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; }
  .set-grid-head {
    display: grid; grid-template-columns: 40px 1fr 1fr 44px; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.15em;
    margin-bottom: 8px;
  }
  .set-row { display: grid; grid-template-columns: 40px 1fr 1fr 44px; gap: 8px; align-items: center; margin-bottom: 8px; }
  .set-num { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .set-check {
    width: 44px; height: 44px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface-alt); border: 1px solid var(--border); color: var(--text-faint);
    transition: all .15s;
  }
  .set-check.done { background: var(--success-soft); border-color: var(--success-border); color: var(--success-text); }

  /* Rest day */
  .rest-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; text-align: center; margin: 0 16px;
  }
  .rest-title { font-family: 'Fraunces', serif; font-size: 20px; color: var(--text); margin-top: 12px; margin-bottom: 8px; }
  .rest-text { font-size: 14px; line-height: 1.5; color: var(--text-muted); }

  /* Nutrition */
  .macro-big { font-family: 'JetBrains Mono', monospace; font-size: 44px; font-weight: 300; color: var(--text); font-variant-numeric: tabular-nums; }
  .macro-label { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); margin-top: 4px; font-variant-numeric: tabular-nums; }
  .macro-row-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
  .macro-row-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-muted); }
  .macro-row-num { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-variant-numeric: tabular-nums; }
  .macro-bar { height: 4px; border-radius: 2px; overflow: hidden; background: var(--border); }
  .macro-fill { height: 100%; transition: width .3s; }
  .alert {
    background: var(--accent-bg); border: 1px solid var(--accent-border);
    border-radius: 16px; padding: 16px; display: flex; gap: 12px;
  }
  .alert-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--accent-soft); color: var(--accent);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .alert-title { font-family: 'Fraunces', serif; font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .alert-text { font-size: 12px; line-height: 1.5; color: var(--text-muted); }
  .meal-list { padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }
  .meal-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
  .meal-time { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted); }
  .meal-name { font-family: 'Fraunces', serif; font-size: 18px; color: var(--text); margin-top: 2px; }
  .meal-totals {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  .meal-total-num { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--text); font-variant-numeric: tabular-nums; }
  .meal-total-lbl { font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-faint); }
  .meal-items { display: flex; flex-direction: column; gap: 4px; }
  .meal-item { font-size: 12px; display: flex; align-items: flex-start; gap: 8px; color: var(--text-muted); }
  .meal-note {
    margin-top: 12px; padding: 10px; border-radius: 8px;
    background: var(--surface-alt); color: var(--text-muted);
    border-left: 2px solid var(--accent); font-size: 11px; line-height: 1.5;
  }
  .supp-row {
    padding: 12px; border-radius: 12px; display: flex; align-items: flex-start; gap: 12px;
    background: var(--surface); border: 1px solid var(--border);
  }
  .supp-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--accent-soft); color: var(--accent);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .supp-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .supp-dose { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); font-variant-numeric: tabular-nums; }
  .supp-note { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* Progress */
  .stat-grid { padding: 0 16px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Program tab */
  .prog-list { padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }
  .prog-day-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .prog-day-num {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
  }
  .prog-subtitle { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; }
  .prog-name { font-family: 'Fraunces', serif; font-size: 18px; color: var(--text); }
  .prog-volume { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; text-align: right; color: var(--text-faint); }
  .prog-ex-list { padding-top: 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
  .prog-ex { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; font-size: 12px; }
  .prog-ex-name { display: flex; align-items: center; gap: 8px; min-width: 0; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .prog-ex-sets { font-family: 'JetBrains Mono', monospace; flex-shrink: 0; color: var(--text-faint); font-variant-numeric: tabular-nums; }

  /* Rest timer */
  .timer {
    position: fixed; bottom: 80px; left: 16px; right: 16px;
    max-width: 440px; margin: 0 auto; z-index: 40;
    background: var(--surface); border: 1px solid var(--accent-border);
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 20px 60px var(--shadow);
  }
  .timer-track { height: 4px; background: var(--border); }
  .timer-fill { height: 100%; background: var(--accent); transition: width 1s linear; }
  .timer-body { display: flex; align-items: center; gap: 16px; padding: 16px; }
  .timer-info { flex: 1; }
  .timer-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-muted); }
  .timer-time { font-family: 'JetBrains Mono', monospace; font-size: 36px; font-weight: 300; color: var(--text); font-variant-numeric: tabular-nums; }
  .timer-btn {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .timer-btn-primary { background: var(--accent-soft); color: var(--accent); }
  .timer-btn-secondary { background: var(--surface-alt); color: var(--text-muted); }

  /* Theme picker */
  .modal-bg {
    position: fixed; inset: 0; z-index: 50;
    display: flex; align-items: flex-end; justify-content: center; padding: 16px;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  @media (min-width: 640px) { .modal-bg { align-items: center; } }
  .modal {
    width: 100%; max-width: 440px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 24px; overflow: hidden;
    box-shadow: 0 20px 60px var(--shadow);
  }
  .modal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px; border-bottom: 1px solid var(--border);
  }
  .modal-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
  .modal-title { font-family: 'Fraunces', serif; font-style: italic; font-size: 24px; color: var(--text); }
  .modal-close {
    width: 40px; height: 40px; border-radius: 12px;
    background: var(--surface-alt); color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
  }
  .theme-grid { padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .theme-option {
    border-radius: 16px; padding: 16px; text-align: left;
    border: 2px solid; transition: all .15s;
  }
  .theme-opt-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .theme-opt-icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .theme-opt-check {
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .theme-opt-name { font-family: 'Fraunces', serif; font-size: 16px; margin-bottom: 2px; }
  .theme-opt-mode { font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 12px; }
  .theme-opt-swatches { display: flex; gap: 6px; }
  .swatch { width: 16px; height: 16px; border-radius: 50%; }

  /* Bottom nav */
  .nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    background: var(--nav-bg); border-top: 1px solid var(--border);
  }
  .nav-inner {
    display: grid; grid-template-columns: repeat(4, 1fr);
    padding: 8px 8px 20px; max-width: 440px; margin: 0 auto;
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
  }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 8px; border-radius: 12px;
  }
  .nav-lbl { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-faint); }
  .nav-btn.active .nav-lbl { color: var(--accent); }

  .history-row {
    padding: 12px; border-radius: 12px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border: 1px solid var(--border);
  }
  .history-date { font-size: 14px; color: var(--text); }
  .history-sets { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted); margin-top: 2px; }
  .history-pct { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); font-variant-numeric: tabular-nums; }
  .empty-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 32px; text-align: center;
  }
  .empty-text { font-size: 14px; color: var(--text-muted); margin-top: 8px; }
</style>
</head>
<body>
<div id="app"></div>

  const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const todayKey = () => new Date().toISOString().slice(0,10);
  const sessionKey = () => `${todayKey()}:day${state.day}`;
  const getSession = () => state.sessions[sessionKey()] || {};
  const setSessionLog = (log) => {
    state.sessions[sessionKey()] = log;
    state.history[todayKey()] = log;
    save();
  };
  const parseRest = (str) => {
    const m = str.match(/(\d+)(?:[–-](\d+))?\s*(min|s)/);
    if (!m) return 90;
    const lo = +m[1], hi = m[2] ? +m[2] : lo;
    const avg = (lo + hi) / 2;
    return m[3] === 'min' ? Math.round(avg * 60) : Math.round(avg);
  };
  const dayAccent = (c) => ({accent: `var(--day-${c})`, soft: `var(--day-${c}-soft)`});
  const getSetsFor = (ex) => {

  function save() {
    try {
      localStorage.setItem('hyp-tracker', JSON.stringify({
        sessions: state.sessions,
        meals: state.meals,
        history: state.history,
        bodyWeight: state.bodyWeight,
        theme: state.theme,
        sessionTime: state.sessionTime
      }));
    } catch(e) { console.warn('save failed', e); }
  }
  function load() {
    try {
      const s = JSON.parse(localStorage.getItem('hyp-tracker') || '{}');
      if (s.sessions) state.sessions = s.sessions;
      if (s.meals) state.meals = s.meals;
      if (s.history) state.history = s.history;
      if (s.bodyWeight) state.bodyWeight = s.bodyWeight;
      if (s.theme && THEMES[s.theme]) state.theme = s.theme;
      if (s.sessionTime === 'morning' || s.sessionTime === 'evening') state.sessionTime = s.sessionTime;
    } catch(e) { console.warn('load failed', e); }
  }

  function applyTheme() {
    const t = THEMES[state.theme];
    const root = document.documentElement;
    Object.entries(t.vars).forEach(([k,v]) => root.style.setProperty(k, v));
  }

  function beep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880; g.gain.value = 0.1;
      o.start(); setTimeout(() => { o.stop(); ctx.close(); }, 400);
    } catch {}
  }

  function render() {

      ? {input: activeEl.dataset.input, ex: activeEl.dataset.ex, i: activeEl.dataset.i, field: activeEl.dataset.field, sel: activeEl.selectionStart}
      : null;

    app.innerHTML = renderApp();

    if (focusInfo) {
      const sel = `[data-input="${focusInfo.input}"][data-ex="${focusInfo.ex||''}"][data-i="${focusInfo.i||''}"][data-field="${focusInfo.field||''}"]`;
      const el = document.querySelector(sel);
      if (el) { el.focus(); try { el.setSelectionRange(focusInfo.sel, focusInfo.sel); } catch {} }

      const el = document.getElementById('bw-input');
      if (el) el.focus();
    }

      {t:"Double Progression", d:"Add reps until you hit the top of the range on all sets, then increase weight 2.5 kg (upper) / 5 kg (lower)."},
      {t:"RIR Progression", d:"Wk 1: 3–4 RIR · Wk 2: 2–3 · Wk 3: 1–2 · Wk 4: 0–1 · Wk 5: deload (40–60% volume cut)."},
      {t:"Compounds vs Isolations", d:"Heavy compounds: 2–3 RIR. Isolations: take last set to true failure."},
      {t:"Stretch Emphasis ◆", d:"Lengthened-position loading drives disproportionate growth (2023–2025 research)."}
    ].map(p => `
      <div class="card" style="padding: 14px;">
        <div style="font-family: 'Fraunces', serif; font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px;">${esc(p.t)}</div>
        <div style="font-size: 12px; line-height: 1.5; color: var(--text-muted);">${esc(p.d)}</div>
      </div>
    `).join('');

    return `
      <div class="page-head">
        <div class="page-eyebrow">6-Day Split · PPL × 2</div>
        <h1 class="page-title">The Program</h1>
        <p class="page-lede">Each muscle trained twice weekly at 16–20 sets. Compounds at RPE 7–8. Isolations to failure. Ramp volume over 4–5 weeks, then deload.</p>
      </div>
      <div class="prog-list">${days}</div>
      <div style="padding: 24px 16px 0;">
        <div class="section-label">Training Principles</div>
        <div class="stack-2" style="display: flex; flex-direction: column; gap: 8px;">${principles}</div>
      </div>
    `;
  }

  function renderNutrition() {
    const plan = MEAL_PLANS[state.sessionTime];
    const guide = SESSION_GUIDE[state.sessionTime];
    const mealsToday = state.meals[todayKey()] || {};
    const consumed = plan.reduce((acc, m) => {
      if (mealsToday[m.id]) {
        return {kcal:acc.kcal+m.totals.kcal, p:acc.p+m.totals.p, c:acc.c+m.totals.c, f:acc.f+m.totals.f};
      }
      return acc;
    }, {kcal:0,p:0,c:0,f:0});

    const macroBar = (label, val, target, colorVar) => {
      const pct = Math.min(100, val/target*100);
      const over = val > target;
      return `
        <div>
          <div class="macro-row-head">
            <span class="macro-row-label">${label}</span>
            <span class="macro-row-num">
              <span style="color: ${over?'var(--accent)':'var(--text)'};">${val}</span><span style="color: var(--text-dim);">/${target}</span>
            </span>
          </div>
          <div class="macro-bar">
            <div class="macro-fill" style="width: ${pct}%; background: var(${colorVar});"></div>
          </div>
        </div>
      `;
    };

    const sessionToggle = `
      <div style="padding: 0 16px 20px;">
        <div style="display: flex; gap: 8px; padding: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px;">
          ${['morning','evening'].map(m => {
            const active = state.sessionTime === m;
            const ic = m === 'morning' ? I.sun(14) : I.moon(14);
            return `<button data-action="set-session" data-session="${m}"
              style="flex:1; padding: 10px; border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;
                background: ${active ? 'var(--accent)' : 'transparent'};
                color: ${active ? 'var(--accent-contrast)' : 'var(--text-muted)'};
                font-family: 'JetBrains Mono', monospace; font-size: 12px; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 500; transition: all .15s;">
              ${ic}<span>${m}</span>
            </button>`;
          }).join('')}
        </div>
      </div>
    `;

    const sessionGuide = `
      <div style="padding: 0 16px 20px;">
        <div class="card-lg">
          <div style="display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px;">
            <div>
              <div class="page-eyebrow" style="margin-bottom: 4px;">${esc(guide.label)}</div>
              <div style="font-family: 'Fraunces', serif; font-style: italic; font-size: 22px; color: var(--text);">Session Guide</div>
              <div style="font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 4px;">${esc(guide.sub)}</div>
            </div>
            <div style="width: 44px; height: 44px; border-radius: 12px; background: var(--accent-soft); color: var(--accent); display: flex; align-items: center; justify-content: center;">
              ${state.sessionTime === 'morning' ? I.sun(20) : I.moon(20)}
            </div>
          </div>
          <div style="display: flex; flex-direction: column; gap: 10px;">
            ${guide.points.map(p => `
              <div style="padding: 10px 12px; border-left: 2px solid var(--accent); background: var(--surface-alt); border-radius: 8px;">
                <div style="font-family: 'Fraunces', serif; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px;">${esc(p.t)}</div>
                <div style="font-size: 12px; line-height: 1.5; color: var(--text-muted);">${esc(p.d)}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;

    const meals = plan.map(m => {
      const eaten = !!mealsToday[m.id];
      const cardStyle = eaten
        ? 'background: var(--success-bg); border: 1px solid var(--success-border);'
        : 'background: var(--surface); border: 1px solid var(--border);';
      const btnStyle = eaten
        ? 'background: var(--success-soft); border: 1px solid var(--success-border); color: var(--success-text);'
        : 'background: var(--surface-alt); border: 1px solid var(--border); color: var(--text-faint);';
      const isWorkoutMeal = m.name.toLowerCase().includes('workout') || m.name.toLowerCase().includes('post');
      const tagStyle = isWorkoutMeal
        ? 'background: var(--accent-soft); color: var(--accent); padding: 2px 6px; border-radius: 4px; margin-left: 6px;'
        : '';
      return `
        <div style="${cardStyle} border-radius: 16px; overflow: hidden;">
          <div style="padding: 16px;">
            <div class="meal-head">
              <div style="flex: 1; min-width: 0;">
                <div class="meal-time">${esc(m.time)}${m.tag ? ` · <span style="${tagStyle}">${esc(m.tag)}</span>` : ''}</div>
                <div class="meal-name">${esc(m.name)}</div>
              </div>
              <button style="${btnStyle} width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;"
                data-action="toggle-meal" data-id="${m.id}">
                ${I.check(16)}
              </button>
            </div>
            <div class="meal-totals">
              <div><div class="meal-total-num">${m.totals.kcal}</div><div class="meal-total-lbl">kcal</div></div>
              <div><div class="meal-total-num">${m.totals.p}</div><div class="meal-total-lbl">P</div></div>
              <div><div class="meal-total-num">${m.totals.c}</div><div class="meal-total-lbl">C</div></div>
              <div><div class="meal-total-num">${m.totals.f}</div><div class="meal-total-lbl">F</div></div>
            </div>
            <ul class="meal-items">
              ${m.items.map(it => `<li class="meal-item"><span style="color: var(--text-dim);">—</span>${esc(it)}</li>`).join('')}
            </ul>
            ${m.note ? `<div class="meal-note">${esc(m.note)}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');

    const supps = SUPPS.map(s => `
      <div class="supp-row">
        <div class="supp-icon">${I.droplet(14)}</div>
        <div style="flex:1">
          <div style="display:flex; align-items:baseline; justify-content:space-between; gap:8px;">
            <div class="supp-name">${esc(s.name)}</div>
            <div class="supp-dose">${esc(s.dose)}</div>
          </div>
          <div class="supp-note">${esc(s.note)}</div>
        </div>
      </div>
    `).join('');

    return `
      <div class="page-head">
        <div class="page-eyebrow">Daily Fuel · 80 kg</div>
        <h1 class="page-title">Nutrition</h1>
      </div>
      ${sessionToggle}
      <div style="padding: 0 16px 20px;">
        <div class="card-lg">
          <div style="display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px;">
            <div>
              <div class="macro-big">${consumed.kcal}</div>
              <div class="macro-label">of ${TARGETS.kcal} kcal target</div>
            </div>
            <div class="macro-label">${TARGETS.kcal - consumed.kcal > 0 ? `${TARGETS.kcal - consumed.kcal} left` : 'complete'}</div>
          </div>
          <div style="display: flex; flex-direction: column; gap: 12px;">
            ${macroBar('Protein (g)', consumed.p, TARGETS.p, '--day-vermilion')}
            ${macroBar('Carbs (g)', consumed.c, TARGETS.c, '--day-amber')}
            ${macroBar('Fat (g)', consumed.f, TARGETS.f, '--day-emerald')}
          </div>
        </div>
      </div>
      ${sessionGuide}
      <div style="padding: 0 16px 16px;">
        <div class="section-label">Meal Schedule · ${guide.label}</div>
      </div>
      <div class="meal-list">${meals}</div>
      <div style="padding: 24px 16px 0;">
        <div class="section-label">Evidence-Backed Supplements</div>
        <div style="display: flex; flex-direction: column; gap: 8px;">${supps}</div>
      </div>
    `;
  }

  function renderProgress() {
    const totalSessions = Object.keys(state.history).length;
    const now = new Date();
    const last7 = Object.entries(state.history).filter(([d]) => (now - new Date(d)) / 86400000 <= 7);
    const weekSets = last7.reduce((sum, [, log]) => sum + Object.values(log).reduce((s, ex) => s + (ex.sets ? ex.sets.filter(set => set.done).length : 0), 0), 0);

    const bwEntries = Object.entries(state.bodyWeight).sort((a,b) => b[0].localeCompare(a[0])).slice(0, 10);
    const bwRows = bwEntries.length > 0 ? bwEntries.map(([d, w]) => `
      <div style="display: flex; align-items: center; justify-content: space-between; padding: 6px 0; font-size: 14px; font-family: 'JetBrains Mono', monospace;">
        <span style="color: var(--text-muted);">${new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
        <span style="color: var(--text); font-variant-numeric: tabular-nums;">${w} kg</span>
      </div>
    `).join('') : `<div style="font-size: 12px; text-align: center; padding: 12px 0; color: var(--text-faint);">Start logging to see your trend</div>`;

    const histRows = Object.keys(state.history).length === 0 ? `
      <div class="empty-card">
        <div style="color: var(--text-dim); display: flex; justify-content: center;">${I.award(24)}</div>
        <div class="empty-text">Your completed sessions will appear here</div>
      </div>
    ` : Object.entries(state.history).sort((a,b) => b[0].localeCompare(a[0])).slice(0,14).map(([d, log]) => {
      const sets = Object.values(log).reduce((s, ex) => s + (ex.sets ? ex.sets.filter(set => set.done).length : 0), 0);
      const total = Object.values(log).reduce((s, ex) => s + (ex.sets ? ex.sets.length : 0), 0);
      return `
        <div class="history-row">
          <div>
            <div class="history-date">${new Date(d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>
            <div class="history-sets">${sets} sets completed</div>
          </div>
          <div class="history-pct">${total ? Math.round(sets/total*100) : 0}%</div>
        </div>
      `;
    }).join('');

    return `
      <div class="page-head">
        <div class="page-eyebrow">Tracking</div>
        <h1 class="page-title">Progress</h1>
      </div>
      <div class="stat-grid">
        <div class="card">
          <div style="color: var(--accent);">${I.activity(16)}</div>
          <div style="font-family:'JetBrains Mono',monospace; font-size: 28px; font-weight: 300; color: var(--text); font-variant-numeric: tabular-nums; margin-top: 12px;">${totalSessions}</div>
          <div class="stat-label">Total Sessions</div>
        </div>
        <div class="card">
          <div style="color: var(--day-amber);">${I.bar(16)}</div>
          <div style="font-family:'JetBrains Mono',monospace; font-size: 28px; font-weight: 300; color: var(--text); font-variant-numeric: tabular-nums; margin-top: 12px;">${weekSets}</div>
          <div class="stat-label">Sets This Week</div>
        </div>
      </div>
      <div style="padding: 0 16px 24px;">
        <div class="section-label">Body Weight · Target 0.4–0.6 kg/month</div>
        <div class="card">
          <div style="display: flex; gap: 8px; margin-bottom: 16px;">
            <input type="number" inputmode="decimal" step="0.1" id="bw-input" class="themed-input"
              placeholder="Today's weight (kg)" value="${esc(state.weightInput)}"
              style="flex:1; padding: 12px 16px; border-radius: 12px;"
              data-input="bw"/>
            <button data-action="log-weight" style="padding: 12px 20px; border-radius: 12px; font-weight: 500; background: var(--accent); color: var(--accent-contrast);">Log</button>
          </div>
          <div>${bwRows}</div>
        </div>
      </div>
      <div style="padding: 0 16px;">
        <div class="section-label">Recent Sessions</div>
        <div style="display: flex; flex-direction: column; gap: 8px;">${histRows}</div>
      </div>
    `;
  }

  function renderTimer() {
    const r = state.rest;
    const mins = Math.floor(r.remaining / 60);
    const secs = r.remaining % 60;
    const pct = ((r.duration - r.remaining) / r.duration) * 100;
    return `
      <div class="timer slide-up">
        <div class="timer-track"><div class="timer-fill" style="width: ${pct}%;"></div></div>
        <div class="timer-body">
          <div class="timer-info">
            <div class="timer-label">Rest</div>
            <div class="timer-time">${mins}:${String(secs).padStart(2,'0')}</div>
          </div>
          <button class="timer-btn timer-btn-primary" data-action="timer-toggle">${r.running ? I.pause(18) : I.play(18)}</button>
          <button class="timer-btn timer-btn-secondary" data-action="timer-reset">${I.rotate(18)}</button>
          <button class="timer-btn timer-btn-secondary" data-action="timer-close">${I.x(18)}</button>
        </div>
      </div>
    `;
  }

  function renderPicker() {
    const options = Object.entries(THEMES).map(([id, t]) => {
      const active = id === state.theme;
      const icon = t.icon === 'sun' ? I.sun(14) : t.icon === 'moon' ? I.moon(14) : I.flame(14);
      const border = active ? t.vars['--accent'] : t.vars['--border'];
      const shadow = active ? `box-shadow: 0 0 0 4px ${t.vars['--accent-soft']};` : '';
      return `
        <button class="theme-option" data-action="set-theme" data-id="${id}"
          style="background: ${t.vars['--surface']}; border-color: ${border}; ${shadow}">
          <div class="theme-opt-head">
            <div class="theme-opt-icon" style="background: ${t.vars['--accent-soft']}; color: ${t.vars['--accent']};">${icon}</div>
            ${active ? `<div class="theme-opt-check" style="background: ${t.vars['--accent']}; color: ${t.vars['--accent-contrast']};">${I.check(12)}</div>` : ''}
          </div>
          <div class="theme-opt-name" style="color: ${t.vars['--text']};">${t.name}</div>
          <div class="theme-opt-mode" style="color: ${t.vars['--text-muted']};">${t.mode}</div>
          <div class="theme-opt-swatches">
            <div class="swatch" style="background: ${t.vars['--accent']};"></div>
            <div class="swatch" style="background: ${t.vars['--day-amber']};"></div>
            <div class="swatch" style="background: ${t.vars['--day-cyan']};"></div>
            <div class="swatch" style="background: ${t.vars['--day-emerald']};"></div>
            <div class="swatch" style="background: ${t.vars['--day-violet']};"></div>
          </div>
        </button>
      `;
    }).join('');

    return `
      <div class="modal-bg fade-in" data-action="close-picker">
        <div class="modal slide-up" data-stop="1">
          <div class="modal-head">
            <div>
              <div class="modal-eyebrow">Appearance</div>
              <div class="modal-title">Theme</div>
            </div>
            <button class="modal-close" data-action="close-picker">${I.x(18)}</button>
          </div>
          <div class="theme-grid">${options}</div>
        </div>
      </div>
    `;
  }

  function renderNav() {
    const items = [
      {id:'today', icon: I.dumbbell, label:'Today'},
      {id:'program', icon: I.calendar, label:'Program'},
      {id:'nutrition', icon: I.apple, label:'Fuel'},
      {id:'progress', icon: I.trending, label:'Progress'}
    ];
    const btns = items.map(it => {
      const active = state.tab === it.id;
      const color = active ? 'var(--accent)' : 'var(--text-faint)';
      return `
        <button class="nav-btn ${active?'active':''}" data-action="set-tab" data-tab="${it.id}">
          <div style="color: ${color};">${it.icon(20)}</div>
          <div class="nav-lbl">${it.label}</div>
        </button>
      `;
    }).join('');
    return `<div class="nav"><div class="nav-inner">${btns}</div></div>`;
  }

  // ============================================================
  //  EVENT HANDLERS
  // ============================================================
  function onClick(e) {
    const target = e.target.closest('[data-action]');
    if (!target) {
      // stop propagation on modal content
      return;
    }
    // Guard: if clicking modal content, don't close modal
    if (target.dataset.action === 'close-picker') {
      // Only close if actual background clicked, not child with data-stop
      if (e.target.closest('[data-stop]')) return;
      state.picker = false;
      render();
      return;
    }
    const a = target.dataset.action;
    switch (a) {
      case 'set-tab':
        state.tab = target.dataset.tab;
        render();
        break;
      case 'set-day':
        state.day = parseInt(target.dataset.day);
        render();
        break;
      case 'toggle-expand':
        const id = target.dataset.id;
        state.expanded[id] = !state.expanded[id];
        render();
        break;
      case 'toggle-set': {
        const ex = target.dataset.ex;
        const i = parseInt(target.dataset.i);
        const rest = target.dataset.rest;
        const session = getSession();
        if (!session[ex]) {
          const exercise = PROGRAM[state.day].exercises.find(x => x.id === ex);
          session[ex] = {sets: Array(exercise.sets).fill(null).map(() => ({weight:'',reps:'',done:false}))};
        }
        if (!session[ex].sets[i]) session[ex].sets[i] = {weight:'',reps:'',done:false};
        const wasDone = session[ex].sets[i].done;
        session[ex].sets[i].done = !wasDone;
        setSessionLog(session);
        if (!wasDone && rest) {
          const sec = parseRest(rest);
          state.rest = {duration: sec, remaining: sec, running: true};
          mountTimer();
        }
        render();
        break;
      }
      case 'toggle-meal': {
        const mid = target.dataset.id;
        const tk = todayKey();
        if (!state.meals[tk]) state.meals[tk] = {};
        state.meals[tk][mid] = !state.meals[tk][mid];
        save();
        render();
        break;
      }
      case 'open-picker':
        state.picker = true;
        render();
        break;
      case 'close-picker':
        state.picker = false;
        render();
        break;
      case 'set-theme':
        state.theme = target.dataset.id;
        state.picker = false;
        save();
        render();
        break;
      case 'set-session':
        state.sessionTime = target.dataset.session;
        save();
        render();
        break;
      case 'timer-toggle':
        if (state.rest) {
          state.rest.running = !state.rest.running;
          const btn = document.querySelector('[data-action="timer-toggle"]');
          if (btn) btn.innerHTML = state.rest.running ? I.pause(18) : I.play(18);
        }
        break;
      case 'timer-reset':
        if (state.rest) {
          state.rest.remaining = state.rest.duration;
          state.rest.running = true;
          updateTimerDom();
          const btn2 = document.querySelector('[data-action="timer-toggle"]');
          if (btn2) btn2.innerHTML = I.pause(18);
        }
        break;
      case 'timer-close': {
        state.rest = null;
        const tEl = document.querySelector('.timer');
        if (tEl) tEl.remove();
        break;
      }
      case 'log-weight': {
        const input = document.getElementById('bw-input');
        const v = input ? parseFloat(input.value) : NaN;
        if (!isNaN(v) && v > 0) {
          state.bodyWeight[todayKey()] = v;
          state.weightInput = '';
          save();
          render();
        }
        break;
      }
    }
  }

  function onInput(e) {
    const t = e.target;
    if (!t.dataset || !t.dataset.input) return;
    if (t.dataset.input === 'set') {
      const ex = t.dataset.ex;
      const i = parseInt(t.dataset.i);
      const field = t.dataset.field;
      const session = getSession();
      if (!session[ex]) {
        const exercise = PROGRAM[state.day].exercises.find(x => x.id === ex);
        session[ex] = {sets: Array(exercise.sets).fill(null).map(() => ({weight:'',reps:'',done:false}))};
      }
      if (!session[ex].sets[i]) session[ex].sets[i] = {weight:'',reps:'',done:false};
      session[ex].sets[i][field] = t.value;
      state.sessions[sessionKey()] = session;
      state.history[todayKey()] = session;
      save();
      // Don't re-render on input to preserve focus & typing.
    } else if (t.dataset.input === 'bw') {
      state.weightInput = t.value;
    }
  }

  // ============================================================
  //  TIMER TICK — surgical DOM update, no full re-render
  // ============================================================
  function updateTimerDom() {
    if (!state.rest) return;
    const timeEl = document.querySelector('.timer-time');
    const fillEl = document.querySelector('.timer-fill');
    if (timeEl) {
      const mins = Math.floor(state.rest.remaining / 60);
      const secs = state.rest.remaining % 60;
      timeEl.textContent = `${mins}:${String(secs).padStart(2,'0')}`;
    }
    if (fillEl) {
      const pct = ((state.rest.duration - state.rest.remaining) / state.rest.duration) * 100;
      fillEl.style.width = `${pct}%`;
    }
  }

  setInterval(() => {
    if (state.rest && state.rest.running && state.rest.remaining > 0) {
      state.rest.remaining--;
      if (state.rest.remaining === 0) beep();
      updateTimerDom();
    }
  }, 1000);

  // ============================================================
  //  INIT
  // ============================================================
  document.addEventListener('click', onClick);
  document.addEventListener('input', onInput);

  load();
  render();
})();
</script>
</body>
</html>
